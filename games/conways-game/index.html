<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Board — PIXELRIFT</title>
  <meta name="description" content="Play Conway's Game of Life in your browser. Draw live cells, watch patterns evolve, and explore emergent complexity — built with vanilla JavaScript and HTML5 Canvas." />
  <link rel="canonical" href="https://rizvee.github.io/PIXELRIFT/games/conways-game/" />
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"VideoGame","name":"Life Board","url":"https://rizvee.github.io/PIXELRIFT/games/conways-game/","description":"Conway's Game of Life with interactive drawing, generation counter, and speed control.","author":{"@type":"Person","name":"Hasan Rizvee","url":"https://github.com/rizvee"},"genre":["Experimental","Simulation"],"playMode":"SinglePlayer","applicationCategory":"Game","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}</script>
  <link rel="stylesheet" href="../../assets/css/global.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="game-page">
  <div class="game-wrapper">
    <header class="game-header">
      <a href="../../" class="back-btn">← PIXELRIFT</a>
      <span class="game-header-title mono">Life Board</span>
      <div class="game-header-meta">
        <button class="btn-sm" id="btn-play">▶ Play</button>
        <button class="btn-sm" id="btn-step">Step</button>
        <button class="btn-sm" id="btn-random">Random</button>
        <button class="btn-sm" id="btn-clear">Clear</button>
        <span style="color:var(--muted2)">|</span>
        <span style="font-size:11px;color:var(--muted)">Gen: <span id="gen-count" style="color:var(--accent)">0</span></span>
        <span style="font-size:11px;color:var(--muted)">FPS:
          <input type="range" id="fps-slider" min="1" max="30" value="10" style="width:50px" />
        </span>
      </div>
    </header>
    <div class="canvas-wrap">
      <canvas id="game-canvas" style="cursor:crosshair"></canvas>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
