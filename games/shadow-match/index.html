<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Shadow Match",

      "@type": "Person",
      "name": "Hasan Rizvee",

<body class="game-page">
  <div class="game-wrapper">
