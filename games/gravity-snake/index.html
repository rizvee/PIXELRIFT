<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Snake — PIXELRIFT</title>
  <meta name="description" content="Play Gravity Snake free online. A vanilla JavaScript arcade game where a sine-wave gravity vector pulls your snake downward. Click to fight physics and survive." />
  <link rel="canonical" href="https://rizvee.github.io/PIXELRIFT/games/gravity-snake/" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Gravity Snake",
    "url": "https://rizvee.github.io/PIXELRIFT/games/gravity-snake/",
    "description": "A vanilla JavaScript arcade game where sine-wave gravity pulls your snake downward.",
    "author": { "@type": "Person", "name": "Hasan Rizvee", "url": "https://github.com/rizvee" },
    "genre": ["Arcade", "Action"],
    "playMode": "SinglePlayer",
    "applicationCategory": "Game",
    "operatingSystem": "Web Browser",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
  <link rel="stylesheet" href="../../assets/css/global.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="game-page">
  <div class="game-wrapper">
    <header class="game-header">
      <a href="../../" class="back-btn" aria-label="Back to PIXELRIFT">← PIXELRIFT</a>
      <span class="game-header-title mono">Gravity Snake</span>
      <div class="game-header-meta">
        <span>SCORE: <span class="score-display" id="score-display">0</span></span>
        <span style="color:var(--muted2)">|</span>
        <span>BEST: <span class="score-display" id="best-display">0</span></span>
      </div>
    </header>
    <div class="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div class="game-overlay" id="overlay">
        <p class="overlay-title" id="overlay-title">GRAVITY SNAKE</p>
        <p class="overlay-score" id="overlay-score">High Score: <span id="overlay-best">0</span></p>
        <p style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-align:center">
          CLICK or SPACE to flap · survive gravity
        </p>
        <button class="btn-primary" id="start-btn">START GAME</button>
      </div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
